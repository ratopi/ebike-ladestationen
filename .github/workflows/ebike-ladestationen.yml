name: Update E-Bike Charging Stations

on:
  schedule:
    - cron: "0 3 * * 1"  # Every Monday at 03:00 UTC
  push:
    branches: [ master ]
  workflow_dispatch:

permissions:
  contents: write
  pages: write

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch stations
        run: python fetch_stations.py

      - name: Prepare publish directory
        run: |
          mkdir -p public
          cp ebike_charging_stations.json public/
          cp index.html public/ 2>/dev/null || true

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
          publish_branch: gh-pages
          commit_message: "Update ebike_charging_stations.json"
          force_orphan: true
